<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Arabic Vocabulary Quiz</title>
  <style>
      *, *::before, *::after{
	  box-sizing: border-box;
      }
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial; margin: 0; padding: 24px; }
    .card { max-width: 760px; margin: 0 auto; padding: 18px; border: 1px solid #ddd; border-radius: 12px; }
    .top { display: flex; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
    .pill { padding: 6px 10px; border: 1px solid #ddd; border-radius: 999px; font-size: 14px; }
    h1 { font-size: 18px; margin: 0 0 12px; }

    /* Bigger Arabic question git repo test*/
    .q{
      font-size: 38px;
      line-height: 1.3;
      /* direction: rtl; */
      margin: 10px 0 6px;
    }

    .hint { color: #666; margin: 0 0 14px; }

    /* Touch-friendly input */
    input { width: 100%; max-width:100%; padding: 12px; font-size: 18px; border: 1px solid #ccc; border-radius: 10px; }

    .row { display: flex; gap: 10px; margin-top: 12px; flex-wrap: wrap; align-items: center; }

    /* Touch-friendly buttons */
    button { padding: 12px 16px; font-size: 16px; border-radius: 10px; border: 1px solid #ccc; background: #fff; cursor: pointer; }
    button.primary { border-color: #111; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }

    .msg { margin-top: 12px; padding: 10px; border-radius: 10px; display: none; }
    .ok { background: #e9fff0; border: 1px solid #b7f3c8; }
    .bad { background: #fff0f0; border: 1px solid #f3b7b7; }
    .footer { margin-top: 14px; color: #666; font-size: 14px; }
    .switch { display:flex; gap:10px; align-items:center; margin-top: 10px; flex-wrap: wrap; }
    select { padding: 10px; border-radius: 10px; border: 1px solid #ccc; }
    label.cb { display:flex; gap:8px; align-items:center; user-select:none; }
    input[type="checkbox"]{ width:auto; }
    .hidden { display: none !important; }

    /* mistake counter tag */
    .tag { display:none; font-weight:600; margin: 6px 0 0; }

    /* chapter multiselect dropdown */
    .chapWrap { position: relative; display: inline-block; }
    .chapBtn { padding: 10px 12px; border-radius: 10px; border: 1px solid #ccc; background: #fff; cursor: pointer; }
    .chapMenu {
      position: absolute; top: calc(100% + 8px); left: 0;
      min-width: 240px; background: #fff; border: 1px solid #ddd;
      border-radius: 12px; padding: 10px; box-shadow: 0 8px 20px rgba(0,0,0,0.08);
      display: none; z-index: 10;
    }
    .chapMenu.open { display: block; }
    .chapItem { display:flex; gap:10px; align-items:center; padding: 6px 4px; }
    .chapHelp { font-size: 12px; color: #666; margin-top: 6px; }
    .chapActions { display:flex; gap:8px; margin-top: 10px; flex-wrap: wrap; }
    .mini { padding: 8px 10px; border-radius: 10px; }
    .chapList { max-height: 220px; overflow: auto; padding-right: 4px; }

    /* starred panel */
    .starGrid { display: grid; grid-template-columns: 1fr; gap: 8px; }
    .starItem {
      border: 1px solid #eee;
      border-radius: 10px;
      padding: 10px;
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
    }
    .starAr { font-size: 24px; line-height: 1.2; direction: rtl; }
    .starEn { color: #555; }
    .starRight { display:flex; gap:8px; align-items:center; flex-wrap: wrap; justify-content: flex-end; }
    .smallBtn { padding: 8px 10px; border-radius: 10px; }
  </style>
</head>

<body>
  <div class="card">
    <div class="top">
      <div class="pill" id="progress">Question 1/1</div>
      <div class="pill" id="score">Score: 0</div>
      <div class="pill" id="starCount">⭐ Starred: 0</div>
    </div>

    <h1 id="title">Arabic Vocabulary Quiz (one question at a time)</h1>

    <div class="switch">
      <label for="mode"><b>Mode:</b></label>
      <select id="mode">
        <option value="ar2en">Arabic → English</option>
        <option value="en2ar">English → Arabic (with ḥarakāt)</option>
      </select>

      <b>Chapters:</b>
      <div class="chapWrap">
        <button class="chapBtn" id="chapBtn" type="button">Select chapters ▾</button>
        <div class="chapMenu" id="chapMenu">
          <div id="chapList" class="chapList"></div>

          <div class="chapActions">
            <button class="mini" id="selAll" type="button">All</button>
            <button class="mini" id="selNone" type="button">None</button>
          </div>

          <div class="chapHelp">Tip: check any combination of chapters.</div>
        </div>
      </div>

      <span id="strictWrap">
        <label class="cb" title="Checked = strict. Unchecked = ignore harakat (base letters only).">
          <input type="checkbox" id="strictHarakat" checked />
          <b>Strict ḥarakāt</b>
        </label>
      </span>

      <span>
        <label class="cb" title="If enabled, correct answers move to next question after 5 seconds.">
          <input type="checkbox" id="autoNext" />
          <b>Auto-next (5s)</b>
        </label>
      </span>

      <button id="shuffleBtn" type="button">Shuffle</button>
      <button id="restartBtn" type="button">Restart</button>
    </div>

    <div class="q" id="questionText">...</div>
    <div class="hint tag" id="wrongCountTag">❗ Wrong before: 0</div>
    <p class="hint" id="hintText">Type your answer and press Check.</p>

    <input id="answerInput" type="text" placeholder="Your answer..." autocomplete="off" />

    <div class="row">
      <button class="primary" id="checkBtn" type="button">Check</button>
      <button id="showBtn" type="button">Show answer</button>
      <button id="starBtn" type="button">⭐ Star</button>
      <button id="nextBtn" type="button" disabled>Next</button>
    </div>

    <div class="msg" id="msgBox"></div>
    <div class="footer" id="footerText"></div>

    <hr style="margin:16px 0; border:none; border-top:1px solid #eee;" />

    <div class="row" style="justify-content: space-between;">
      <b>Study Later</b>
      <button id="toggleStarredBtn" type="button">Show Starred Words</button>
    </div>

    <div id="starredPanel" class="hidden" style="margin-top:10px;">
      <div id="starredSummary" class="hint" style="margin-bottom:8px;"></div>
      <div id="starredList"></div>
    </div>
  </div>

  <!-- IMPORTANT: load vocab first -->
  <script src="vocab.js"></script>

  <script>
    // Load vocab from vocab.js
    const vocab = window.VOCAB || [];

    // --- State ---
    let deck = [];
    let i = 0;
    let score = 0;
    let answered = false;

    // Auto-next state
    let autoNextTimer = null;
    const AUTO_NEXT_MS = 5000;

    let inMistakeReview = false;
    const wrongCountByKey = new Map();
    const mistakeKeys = new Set();
    const starredKeys = new Set();

    // --- Elements ---
    const titleEl = document.getElementById("title");
    const progressEl = document.getElementById("progress");
    const scoreEl = document.getElementById("score");
    const qEl = document.getElementById("questionText");
    const hintEl = document.getElementById("hintText");
    const inputEl = document.getElementById("answerInput");
    const msgEl = document.getElementById("msgBox");
    const footerEl = document.getElementById("footerText");
    const wrongCountTagEl = document.getElementById("wrongCountTag");

    const modeEl = document.getElementById("mode");
    const strictWrapEl = document.getElementById("strictWrap");
    const strictEl = document.getElementById("strictHarakat");
    const autoNextEl = document.getElementById("autoNext");

    const checkBtn = document.getElementById("checkBtn");
    const showBtn = document.getElementById("showBtn");
    const starBtn = document.getElementById("starBtn");
    const nextBtn = document.getElementById("nextBtn");
    const shuffleBtn = document.getElementById("shuffleBtn");
    const restartBtn = document.getElementById("restartBtn");

    const starCountEl = document.getElementById("starCount");
    const toggleStarredBtn = document.getElementById("toggleStarredBtn");
    const starredPanel = document.getElementById("starredPanel");
    const starredSummary = document.getElementById("starredSummary");
    const starredList = document.getElementById("starredList");

    const chapBtn = document.getElementById("chapBtn");
    const chapMenu = document.getElementById("chapMenu");
    const chapList = document.getElementById("chapList");
    const selAll = document.getElementById("selAll");
    const selNone = document.getElementById("selNone");

    const chapterState = new Map();

    function clearAutoNext() {
      if (autoNextTimer) {
        clearTimeout(autoNextTimer);
        autoNextTimer = null;
      }
    }

    function scheduleAutoNext() {
      clearAutoNext();
      if (!autoNextEl.checked) return;
      autoNextTimer = setTimeout(() => {
        if (answered) nextQuestion();
      }, AUTO_NEXT_MS);
    }

    function getAllChaptersFromVocab() {
      return [...new Set(vocab.map(v => v.chapter))].sort((a,b) => a-b);
    }

    function setDefaultChapterSelectionIfEmpty() {
      const chapters = getAllChaptersFromVocab();
      if (chapters.length === 0) return;
      if (chapterState.size === 0) {
        chapters.forEach(ch => chapterState.set(ch, ch === chapters[0])); // select chapter 1 by default
        return;
      }
      for (const ch of chapters) if (!chapterState.has(ch)) chapterState.set(ch, false);
    }

    function selectedChapters() {
      return [...chapterState.entries()].filter(([,c])=>c).map(([ch])=>ch).sort((a,b)=>a-b);
    }

    function updateChapterButtonText() {
      const sel = selectedChapters();
      chapBtn.textContent = sel.length ? `Chapters: ${sel.join(", ")} ▾` : "Select chapters ▾";
    }

    function renderChapterCheckboxes() {
      setDefaultChapterSelectionIfEmpty();
      const chapters = getAllChaptersFromVocab();
      chapList.innerHTML = "";
      chapters.forEach(ch => {
        const row = document.createElement("div");
        row.className = "chapItem";
        const cb = document.createElement("input");
        cb.type = "checkbox";
        cb.id = `ch_${ch}`;
        cb.checked = !!chapterState.get(ch);
        cb.addEventListener("change", () => {
          chapterState.set(ch, cb.checked);
          updateChapterButtonText();
          restart();
        });
        const label = document.createElement("label");
        label.htmlFor = cb.id;
        label.textContent = `Chapter ${ch}`;
        row.appendChild(cb); row.appendChild(label);
        chapList.appendChild(row);
      });
      updateChapterButtonText();
    }

    function buildDeckFromSelection() {
      const sel = selectedChapters();
      return vocab.filter(item => sel.includes(item.chapter));
    }

    function itemKey(item) { return `${item.chapter}||${item.ar}||${item.en}`; }

    function markMistake(item) {
      const k = itemKey(item);
      mistakeKeys.add(k);
      wrongCountByKey.set(k, (wrongCountByKey.get(k) || 0) + 1);
    }

    function getWrongCount(item) { return wrongCountByKey.get(itemKey(item)) || 0; }

    function normalizeEnglish(s) { return s.trim().toLowerCase().replace(/\s+/g, " "); }

    function stripHarakat(s) {
      return s.replace(/[\u0610-\u061A\u064B-\u065F\u0670\u06D6-\u06ED]/g, "");
    }

    function normalizeArabic(s, strictHarakat) {
      let x = s.trim().replace(/\s+/g, " ");
      x = x.replace(/\u0640/g, ""); // tatweel
      return strictHarakat ? x : stripHarakat(x);
    }

    function setMessage(text, ok) {
      msgEl.style.display = "block";
      msgEl.className = "msg " + (ok ? "ok" : "bad");
      msgEl.textContent = text;
    }

    function clearMessage() {
      msgEl.style.display = "none";
      msgEl.textContent = "";
      msgEl.className = "msg";
    }

    function updateStrictVisibility() {
      const show = modeEl.value === "en2ar";
      strictWrapEl.classList.toggle("hidden", !show);
    }

    function isStarred(item) { return starredKeys.has(itemKey(item)); }

    function updateStarCount() {
      starCountEl.textContent = `⭐ Starred: ${starredKeys.size}`;
    }

    function updateStarButton() {
      if (deck.length === 0) return;
      starBtn.textContent = isStarred(deck[i]) ? "⭐ Starred" : "⭐ Star";
    }

    function toggleStarCurrent() {
      if (deck.length === 0) return;
      clearAutoNext();
      const k = itemKey(deck[i]);
      if (starredKeys.has(k)) starredKeys.delete(k); else starredKeys.add(k);
      updateStarCount(); updateStarButton(); renderStarredPanel();
      setMessage(starredKeys.has(k) ? "⭐ Added to Study Later" : "⭐ Removed from Study Later", true);
    }

    function renderStarredPanel() {
      const items = [];
      for (const item of vocab) if (starredKeys.has(itemKey(item))) items.push(item);

      updateStarCount();

      if (items.length === 0) {
        starredSummary.textContent = "No starred words yet. Use ⭐ Star during the quiz.";
        starredList.innerHTML = "";
        return;
      }

      starredSummary.textContent = `Starred words: ${items.length}`;

      starredList.innerHTML = `<div class="starGrid">${
        items.map(it => `
          <div class="starItem">
            <div>
              <div class="starAr">${it.ar}</div>
              <div class="starEn">${it.en}</div>
            </div>
            <div class="starRight">
              <span class="pill">Ch ${it.chapter}</span>
              <button class="smallBtn" data-unstar="${itemKey(it)}">Unstar</button>
            </div>
          </div>
        `).join("")
      }</div>`;

      starredList.querySelectorAll("[data-unstar]").forEach(btn => {
        btn.addEventListener("click", () => {
          const k = btn.getAttribute("data-unstar");
          starredKeys.delete(k);
          updateStarCount();
          renderStarredPanel();
          updateStarButton();
        });
      });
    }

    function currentQA() {
      const item = deck[i];
      const mode = modeEl.value;

      if (mode === "ar2en") {
        return { question: item.ar, answer: item.en, hint: "Answer in English." };
      } else {
        const strict = strictEl.checked;
        return {
          question: item.en,
          answer: item.ar,
          hint: strict
            ? "Answer in Arabic (must match ḥarakāt exactly)."
            : "Answer in Arabic (ḥarakāt ignored; base letters only)."
        };
      }
    }

    function render() {
      clearAutoNext();
      updateStrictVisibility();
      updateChapterButtonText();
      updateStarCount();

      const sel = selectedChapters();

      if (sel.length === 0 || deck.length === 0) {
        titleEl.textContent = "Arabic Vocabulary Quiz";
        qEl.textContent = sel.length === 0 ? "No chapter selected." : "No words found for selected chapter(s).";
        hintEl.textContent = sel.length === 0 ? "Open Chapters and check at least one." : "Select another chapter.";
        wrongCountTagEl.style.display = "none";
        progressEl.textContent = "—";
        scoreEl.textContent = "Score: 0";
        inputEl.value = "";
        inputEl.disabled = true;
        checkBtn.disabled = true;
        showBtn.disabled = true;
        starBtn.disabled = true;
        nextBtn.disabled = true;
        clearMessage();
        footerEl.textContent = "";
        return;
      }

      titleEl.textContent = inMistakeReview
        ? "Mistakes Review (only the ones you missed)"
        : "Arabic Vocabulary Quiz (one question at a time)";

      const item = deck[i];
      const { question, hint } = currentQA();
      qEl.textContent = question;
      
      //Force current direction per mode
      if(modeEl.value == "ar2en"){
	  qEl.style.direction="rtl";
      } else {
	  qEl.style.direction="ltr";
      }
      qEl.style.unicodeBidi = "isolate";
      
      hintEl.textContent = hint;

      progressEl.textContent = `Question ${i + 1}/${deck.length}`;
      scoreEl.textContent = `Score: ${score}`;

      const wrongBefore = getWrongCount(item);
      if (wrongBefore > 0) {
        wrongCountTagEl.style.display = "block";
        wrongCountTagEl.textContent = `❗ Wrong before: ${wrongBefore}`;
      } else {
        wrongCountTagEl.style.display = "none";
      }

      inputEl.value = "";
      inputEl.disabled = false;
      checkBtn.disabled = false;
      showBtn.disabled = false;
      starBtn.disabled = false;
      inputEl.focus();

      answered = false;
      nextBtn.disabled = true;

      clearMessage();
      footerEl.textContent = "Tip: press Enter to Check. Use Next after checking.";

      updateStarButton();
    }

    function checkAnswer() {
      if (answered || deck.length === 0) return;
      clearAutoNext();

      const item = deck[i];
      const { answer } = currentQA();
      const mode = modeEl.value;

      if (!inputEl.value.trim()) { setMessage("Type an answer first.", false); return; }

      answered = true;
      nextBtn.disabled = false;

      let correct = false;

      if (mode === "ar2en") {
        const user = normalizeEnglish(inputEl.value);
        const key  = normalizeEnglish(answer);
        if (user === key) { correct = true; score += 1; setMessage("✅ Correct! (Next in 5s…)", true); }
        else { markMistake(item); setMessage(`❌ Not quite. Correct answer: ${answer}`, false); }
      } else {
        const strict = strictEl.checked;
        const user = normalizeArabic(inputEl.value, strict);
        const key  = normalizeArabic(answer, strict);
        if (user === key) { correct = true; score += 1; setMessage("✅ Correct! (Next in 5s…)", true); }
        else {
          markMistake(item);
          const extra = strict ? " (strict ḥarakāt)" : " (ḥarakāt ignored)";
          setMessage(`❌ Not quite${extra}. Correct answer: ${answer}`, false);
        }
      }

      scoreEl.textContent = `Score: ${score}`;
      if (correct) scheduleAutoNext();
    }

    function showAnswer() {
      if (deck.length === 0) return;
      clearAutoNext();
      const item = deck[i];
      const { answer } = currentQA();
      answered = true;
      nextBtn.disabled = false;
      markMistake(item);
      setMessage(`Answer: ${answer}`, true);
    }

    function startMistakeReview() {
      const sel = selectedChapters();
      const mistakeDeck = [];
      const added = new Set();

      for (const item of vocab) {
        if (!sel.includes(item.chapter)) continue;
        const k = itemKey(item);
        if (mistakeKeys.has(k) && !added.has(k)) { mistakeDeck.push(item); added.add(k); }
      }

      if (mistakeDeck.length === 0) return false;
      inMistakeReview = true;
      deck = mistakeDeck;
      i = 0;
      score = 0;
      render();
      return true;
    }

    function finishQuiz() {
      clearAutoNext();

      if (!inMistakeReview && mistakeKeys.size > 0) {
        const ok = confirm(`You had ${mistakeKeys.size} mistake(s). Do you want to review them now?`);
        if (ok) { const started = startMistakeReview(); if (started) return; }
      }

      qEl.textContent = "🎉 Finished!";
      hintEl.textContent = "";
      wrongCountTagEl.style.display = "none";
      inputEl.value = "";
      inputEl.disabled = true;
      checkBtn.disabled = true;
      showBtn.disabled = true;
      starBtn.disabled = true;
      nextBtn.disabled = true;

      setMessage(`Final score: ${score}/${deck.length}`, true);

      footerEl.textContent = inMistakeReview
        ? "Mistakes review completed. Press Restart to start again."
        : "Press Restart to play again.";
    }

    function nextQuestion() {
      clearAutoNext();
      if (!answered || deck.length === 0) return;
      if (i < deck.length - 1) { i += 1; render(); }
      else { finishQuiz(); }
    }

    function shuffleDeck() {
      clearAutoNext();
      for (let k = deck.length - 1; k > 0; k--) {
        const r = Math.floor(Math.random() * (k + 1));
        [deck[k], deck[r]] = [deck[r], deck[k]];
      }
      i = 0;
      score = 0;
      render();
    }

    function restart() {
      clearAutoNext();
      deck = buildDeckFromSelection();
      i = 0;
      score = 0;
      answered = false;

      inMistakeReview = false;
      wrongCountByKey.clear();
      mistakeKeys.clear();

      inputEl.disabled = false;
      checkBtn.disabled = false;
      showBtn.disabled = false;
      starBtn.disabled = false;

      render();
    }

    // Chapter dropdown behavior
    function toggleChapMenu(open) {
      const shouldOpen = (open !== undefined) ? open : !chapMenu.classList.contains("open");
      chapMenu.classList.toggle("open", shouldOpen);
    }
    chapBtn.addEventListener("click", (e) => { e.stopPropagation(); toggleChapMenu(); });
    document.addEventListener("click", () => toggleChapMenu(false));
    chapMenu.addEventListener("click", (e) => { e.stopPropagation(); });

    selAll.addEventListener("click", () => {
      for (const ch of getAllChaptersFromVocab()) chapterState.set(ch, true);
      renderChapterCheckboxes();
      restart();
    });
    selNone.addEventListener("click", () => {
      for (const ch of getAllChaptersFromVocab()) chapterState.set(ch, false);
      renderChapterCheckboxes();
      restart();
    });

    // Starred panel toggle
    toggleStarredBtn.addEventListener("click", () => {
      const isOpen = !starredPanel.classList.contains("hidden");
      starredPanel.classList.toggle("hidden", isOpen);
      toggleStarredBtn.textContent = isOpen ? "Show Starred Words" : "Hide Starred Words";
      if (!isOpen) renderStarredPanel();
    });

    // Events
    checkBtn.addEventListener("click", checkAnswer);
    showBtn.addEventListener("click", showAnswer);
    starBtn.addEventListener("click", toggleStarCurrent);
    nextBtn.addEventListener("click", nextQuestion);
    shuffleBtn.addEventListener("click", shuffleDeck);
    restartBtn.addEventListener("click", restart);

    modeEl.addEventListener("change", () => { restart(); });
    strictEl.addEventListener("change", () => { render(); });
    autoNextEl.addEventListener("change", () => { clearAutoNext(); });

    inputEl.addEventListener("keydown", (e) => { if (e.key === "Enter") checkAnswer(); });

    // Start
    renderChapterCheckboxes();
    updateStarCount();
    renderStarredPanel();
    restart();
  </script>
</body>
</html>
